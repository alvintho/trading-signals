<svg width="580" height="120" viewBox="0 0 700 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for gradients -->
    <defs>
        <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#2DFF34"/>
            <stop offset="100%" style="stop-color:#00B7FF"/>
        </linearGradient>
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#FFCE5F"/>
            <stop offset="100%" style="stop-color:#2DFF34"/>
        </linearGradient>
    </defs>

    <!-- Rising bars -->
    <rect x="24" y="62" width="18" height="36" rx="3" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="48" y="44" width="18" height="54" rx="3" fill="url(#barGrad)" opacity="0.8"/>
    <rect x="72" y="26" width="18" height="72" rx="3" fill="url(#barGrad)"/>

    <!-- Text: Trading -->
    <text x="120" y="95" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white">Trading</text>

    <!-- Text: Signals -->
    <text x="420" y="95" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white">Signals</text>
</svg>